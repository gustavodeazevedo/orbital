spring.application.name=orbital-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orbital}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=${PORT:8080}

app.security.jwt.secret=${JWT_SECRET:orbital-dev-secret-key-orbital-dev-secret-key-2026}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.security.refresh.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:15}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/reset-password}
app.email.from=${EMAIL_FROM:Orbital <onboarding@resend.dev>}
app.email.resend.api-url=${RESEND_API_URL:https://api.resend.com/emails}
app.email.resend.api-key=${RESEND_API_KEY:}
